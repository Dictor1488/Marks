name: Export Marks source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect Python source
        shell: bash
        run: |
          mkdir -p export
          find . -type f -name '*.py' -not -path './.git/*' -print0 | while IFS= read -r -d '' file; do
            mkdir -p "export/$(dirname "$file")"
            cp "$file" "export/$file"
          done
          find export -type f -name '*.py' -print | sort > export/python-files.txt

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: marks-python-source
          path: export
          if-no-files-found: error
          retention-days: 1
