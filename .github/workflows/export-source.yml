name: Export Marks source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect repository source
        shell: bash
        run: |
          mkdir -p export
          tar --exclude='./.git' --exclude='./export' --exclude='./.github/workflows/export-source.yml' -cf - . | tar -xf - -C export
          find export -type f -print | sort > export/all-files.txt

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: marks-full-source
          path: export
          if-no-files-found: error
          retention-days: 1
