name: Bootstrap Marks repository

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/bootstrap-marks.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download source repository
        run: |
          curl -L --fail https://github.com/Dictor1488/Masters-Marks/archive/refs/heads/backup-before-split.zip -o source.zip
          unzip -q source.zip -d source
          curl -L --fail https://raw.githubusercontent.com/Dictor1488/Masters-Marks/main/tools/repo_split.py -o repo_split.py
      - name: Build standalone Marks source
        run: |
          python repo_split.py --target marks --root . --source source/Masters-Marks-backup-before-split
          rm -rf source source.zip repo_split.py
      - name: Commit Marks repository
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m "Initialize standalone Marks mod"
          git push origin main
