name: Validate Marks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run repository validation
        id: validation
        shell: bash
        run: |
          set +e
          python3 tools/debug_check.py > validation.txt 2>&1
          status=$?
          grep -nE '(_LINKAGE_RESULTS|_SWF_RESULTS|MarksPanelResults)' \
            python/gui/mods/mod_under_pressure_marks.py > scaleform-results-refs.txt || true
          cat validation.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marks-validation-report
          path: |
            validation.txt
            scaleform-results-refs.txt
            python/gui/mods/mod_under_pressure_marks.py
          if-no-files-found: error
          retention-days: 1

      - name: Fail when validation failed
        if: steps.validation.outputs.status != '0'
        run: exit 1
